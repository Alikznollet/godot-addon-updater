name: Release

# This workflow only runs when you push a git tag that starts with 'v' (like v1.0.0)
on:
  push:
    tags:
      - 'v*'

# GoReleaser needs permission to upload files to your GitHub Releases page
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs the git history to generate changelogs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.TAP_TOKEN }}

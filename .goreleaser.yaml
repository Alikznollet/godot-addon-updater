project_name: gau

builds:
  - env:
    - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    dir: ./cli

archives:
  - format: tar.gz
    format_overrides
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Upload to Homebrew and Scoop bucket

brews:
  - repository:
      owner: alikznollet
      name: homebrew-tap
    description: "A completely optional package manager for Godot Addons."
    homepage: "https://github.com/alikznollet/godot-addon-updater"
    goarm: 6

scoops:
  - repository:
      owner: alikznollet
      name: scoop-bucket
    description: "A completely optional package manager for Godot Addons."
    homepage: "https://github.com/alikznollet/godot-addon-updater"
